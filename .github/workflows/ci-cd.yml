name: CI/CD Pipeline

# Trigger on pushes to main (deployment) and PRs targeting main (gate before merge)
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Run Django backend tests
  # ─────────────────────────────────────────────
  test-backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: vibedb_test
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      POSTGRES_DB: vibedb_test
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
      DB_HOST: localhost
      DB_PORT: 5432
      DJANGO_KEY: ci-test-secret-key-not-used-in-production
      ALLOWED_HOSTS: localhost,127.0.0.1
      DEBUG: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r server/requirements.txt

      - name: Run Django tests
        run: python server/manage.py test

  # ─────────────────────────────────────────────
  # JOB 2: Lint and build the React frontend
  # ─────────────────────────────────────────────
  test-frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: "./client/package-lock.json"

      - name: Install dependencies
        working-directory: ./client
        run: npm ci

      - name: Lint
        working-directory: ./client
        run: npm run lint

      - name: Build
        working-directory: ./client
        run: npm run build

      # NOTE: Cypress e2e tests are skipped here because they need a running
      # backend server, which adds significant complexity. Add them later
      # once the basic pipeline is stable.

  # ─────────────────────────────────────────────
  # JOB 3: Verify Dockerfiles aren't broken
  # ─────────────────────────────────────────────
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create dummy .env for build
        run: touch .env

      - name: Build Docker images
        run: docker compose build

  # ─────────────────────────────────────────────
  # JOB 4: Deploy to EC2 (only after all 3 jobs pass)
  # ─────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd VibeGamer_v1
            git pull origin main
            docker compose up --build -d
