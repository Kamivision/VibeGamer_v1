services:
  db:
    image: postgres:16
    container_name: vibedb-container
    env_file:
      - .env
    volumes:
      - vibe_postgres_data:/var/lib/postgresql/data

  backend:
    build: ./server
    container_name: vibeserver-container
    env_file:
      - .env
    command: sh -c "python manage.py migrate && gunicorn vibe_server.wsgi --bind 0.0.0:8000 --reload"
    ports:
      - "8000:8000"
    volumes:
      - ./server:/app
    depends_on:
      - db
  
  frontend:
    build: ./client
    container_name: vibeclient-container
    ports:
      - "80:80"
    volumes:
      - ./client/dist:/usr/share/nginx/html
      - ./default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend

volumes:
  vibe_postgres_data: